<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siyu Li - Be Right Back</title>
    <meta name="robots" content="noindex"> <!-- Prevent search engines from indexing the offline page -->
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .offline-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
        }
        .offline-container h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-color);
        }
        .offline-container p {
            font-size: 16px;
            color: var(--text-muted);
            max-width: 400px;
            line-height: 1.6;
        }
        .offline-brand {
            position: absolute;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: 700;
            color: var(--text-color);
            text-decoration: none;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body>
    <div class="offline-brand">Siyu Li</div>
    <div class="offline-container">
        <h1>Crafting the next update</h1>
        <p>My portfolio is getting a little refresh and will be back online shortly. Thank you for your patience!</p>
    </div>
</body>
</html>
